<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#1A4731"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Amanah"/>
<title>Amanah Indonesia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g9:#0D2818;--g8:#1A4731;--g7:#1E5C3A;--g6:#2D7A4F;--g5:#3A9E68;--g4:#5CB87F;
  --g1:#D4EDE0;--g0:#EBF7F0;--gold:#C9941A;--goldf:#F2C94C;--goldp:#FEF9EC;
  --red:#DC2626;--redl:#FEE2E2;--amb:#D97706;--ambl:#FEF3C7;
  --cream:#FAFAF7;--gr8:#1F2937;--gr6:#4B5563;--gr4:#9CA3AF;--gr2:#E5E7EB;--gr1:#F3F4F6;--wh:#FFFFFF;
  --sh-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --sh-md:0 4px 12px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
  --sh-lg:0 10px 30px rgba(0,0,0,.12),0 4px 8px rgba(0,0,0,.08);
  --rsm:8px;--rmd:14px;--rlg:20px;--rxl:28px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--cream);color:var(--gr8);overscroll-behavior:none}
.app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;background:var(--cream);overflow:hidden}

/* ── SPLASH ── */
.splash{min-height:100vh;background:linear-gradient(160deg,var(--g9) 0%,var(--g7) 50%,var(--g6) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;position:relative;overflow:hidden}
.splash::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(201,148,26,.18) 0%,transparent 70%)}
.splash::after{content:'';position:absolute;bottom:-60px;left:-60px;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.05) 0%,transparent 70%)}
.s-icon{width:80px;height:80px;background:rgba(255,255,255,.12);backdrop-filter:blur(10px);border-radius:24px;border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 8px 32px rgba(0,0,0,.2);font-size:38px}
.s-title{font-family:'Lora',serif;font-size:28px;font-weight:600;color:#fff;text-align:center;letter-spacing:-.3px}
.s-sub{font-size:12px;color:rgba(255,255,255,.65);text-align:center;margin-top:6px;letter-spacing:.5px;text-transform:uppercase}
.s-card{background:rgba(255,255,255,.97);border-radius:var(--rxl);padding:32px 24px;width:100%;max-width:360px;box-shadow:var(--sh-lg);position:relative;z-index:1}
.s-card h2{font-size:20px;font-weight:700;color:var(--g9);margin-bottom:6px}
.s-card p{font-size:13.5px;color:var(--gr6);margin-bottom:24px;line-height:1.5}

/* ── INPUTS ── */
.il{font-size:11px;font-weight:700;color:var(--gr6);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px}
.if{width:100%;padding:13px 14px;border:1.5px solid var(--gr2);border-radius:var(--rsm);font-size:15px;font-family:inherit;color:var(--gr8);background:var(--wh);outline:none;transition:border-color .2s}
.if:focus{border-color:var(--g5);box-shadow:0 0 0 3px rgba(58,158,104,.12)}
.if::placeholder{color:var(--gr4)}
.if.pfx{padding-left:42px}
.ig{margin-bottom:16px;position:relative}
.pfx-txt{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--gr6);font-weight:500;pointer-events:none}
select.if{appearance:none;cursor:pointer}
textarea.if{resize:vertical;min-height:90px}

/* ── BUTTONS ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:var(--rsm);font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;border:none;transition:all .15s;width:100%;text-decoration:none}
.btn-p{background:var(--g7);color:#fff}
.btn-p:active{opacity:.85}
.btn-o{background:transparent;color:var(--g7);border:1.5px solid var(--g6)}
.btn-o:active{background:var(--g0)}
.btn-g{background:var(--gold);color:#fff}
.btn-r{background:var(--red);color:#fff}
.btn-gh{background:var(--gr1);color:var(--gr6);border:1px solid var(--gr2)}
.btn-sm{padding:8px 14px;font-size:12.5px;width:auto;border-radius:6px}
.btn-ic{width:40px;height:40px;padding:0;border-radius:10px;flex-shrink:0}

/* ── TOP NAV ── */
.tnav{position:sticky;top:0;z-index:100;background:var(--wh);border-bottom:1px solid var(--gr2);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh-sm)}
.tnav-logo{font-family:'Lora',serif;font-size:15px;font-weight:600;color:var(--g8)}
.nib{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--gr1);border:none;font-size:18px;transition:all .15s;position:relative}
.nib:active{background:var(--g0)}
.ndot{width:8px;height:8px;background:var(--red);border-radius:4px;position:absolute;top:6px;right:6px;border:1.5px solid var(--wh)}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--wh);border-top:1px solid var(--gr2);display:flex;z-index:100;padding:8px 0 calc(8px + env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;border:none;background:none;color:var(--gr4);transition:color .15s;font-family:inherit}
.bni.act{color:var(--g7)}
.bni-lbl{font-size:10px;font-weight:600;letter-spacing:.3px}
.bni-dot{width:4px;height:4px;border-radius:2px;background:var(--g6);opacity:0;transition:opacity .15s}
.bni.act .bni-dot{opacity:1}
.bni-icon{font-size:22px;line-height:1}

/* ── PAGE ── */
.page{padding:16px;padding-bottom:90px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── CARDS ── */
.card{background:var(--wh);border-radius:var(--rmd);padding:16px;box-shadow:var(--sh-sm);border:1px solid rgba(0,0,0,.04)}
.card+.card{margin-top:12px}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,var(--g8) 0%,var(--g6) 100%);border-radius:var(--rlg);padding:20px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.07)}
.hero::before{content:'';position:absolute;bottom:-20px;right:40px;width:80px;height:80px;border-radius:50%;background:rgba(201,148,26,.2)}
.hero-g{font-size:12px;opacity:.75;margin-bottom:4px;font-weight:500}
.hero-n{font-family:'Lora',serif;font-size:20px;font-weight:600;margin-bottom:12px}
.hero-stats{display:flex;gap:16px}
.hero-s{background:rgba(255,255,255,.12);backdrop-filter:blur(4px);border-radius:10px;padding:10px 14px;text-align:center}
.hero-sv{font-size:18px;font-weight:800;line-height:1}
.hero-sl{font-size:10px;opacity:.7;margin-top:3px;font-weight:500}

/* ── QA GRID ── */
.qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.qa-item{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;padding:12px 6px;background:var(--wh);border-radius:var(--rmd);box-shadow:var(--sh-sm);border:1px solid rgba(0,0,0,.04);transition:all .15s;border:none;font-family:inherit}
.qa-item:active{transform:scale(.97)}
.qa-ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.qa-lbl{font-size:10.5px;font-weight:600;color:var(--gr6);text-align:center;line-height:1.3}

/* ── SECTION ── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.st{font-size:15px;font-weight:700;color:var(--g9)}
.sl{font-size:12.5px;color:var(--g6);font-weight:600;cursor:pointer;background:none;border:none;font-family:inherit}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.bv{background:var(--g1);color:var(--g7)}
.bu{background:var(--gr1);color:var(--gr6)}
.bd{background:var(--redl);color:var(--red)}
.bp{background:var(--ambl);color:var(--amb)}
.bg{background:var(--goldp);color:var(--gold)}

/* ── USER CARDS ── */
.uc{display:flex;align-items:center;gap:12px;padding:14px;background:var(--wh);border-radius:var(--rmd);box-shadow:var(--sh-sm);border:1px solid rgba(0,0,0,.04);cursor:pointer;transition:all .15s;margin-bottom:10px;width:100%;font-family:inherit;text-align:left}
.uc:active{opacity:.85}
.av{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
.av1{background:linear-gradient(135deg,var(--g6),var(--g8))}
.av2{background:linear-gradient(135deg,#3B82F6,#1D4ED8)}
.av3{background:linear-gradient(135deg,#F59E0B,#D97706)}
.av4{background:linear-gradient(135deg,#EF4444,#B91C1C)}
.av5{background:linear-gradient(135deg,var(--g6),var(--g8))}
.ui{flex:1;min-width:0}
.un{font-size:14px;font-weight:700;color:var(--gr8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.um{font-size:11.5px;color:var(--gr4);margin-top:3px}

/* ── CHIPS ── */
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--g0);color:var(--g7);border:1px solid var(--g1)}

/* ── SEARCH BAR ── */
.sb{display:flex;align-items:center;gap:10px;background:var(--wh);border:1.5px solid var(--gr2);border-radius:var(--rmd);padding:11px 14px;margin-bottom:16px;transition:border-color .2s}
.sb:focus-within{border-color:var(--g5);box-shadow:0 0 0 3px rgba(58,158,104,.1)}
.sb input{flex:1;border:none;outline:none;font-family:inherit;font-size:14.5px;background:transparent;color:var(--gr8)}
.sb input::placeholder{color:var(--gr4)}

/* ── TABS ── */
.tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--gr1);border-radius:10px;padding:4px}
.tab{flex:1;padding:8px;border:none;background:none;border-radius:8px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--gr6);cursor:pointer;transition:all .15s}
.tab.act{background:var(--wh);color:var(--g7);box-shadow:var(--sh-sm)}

/* ── FILTER CHIPS ── */
.scroll-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:16px}
.scroll-row::-webkit-scrollbar{display:none}
.fc{padding:6px 14px;border-radius:20px;border:1.5px solid var(--gr2);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;background:var(--wh);color:var(--gr6);flex-shrink:0;font-family:inherit}
.fc.act{background:var(--g7);color:#fff;border-color:var(--g7)}

/* ── PROFILE ── */
.ph{background:linear-gradient(160deg,var(--g9) 0%,var(--g7) 100%);padding:24px 16px 60px;color:#fff;position:relative}
.pav{width:72px;height:72px;border-radius:20px;border:3px solid rgba(255,255,255,.3);font-size:22px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(255,255,255,.25),rgba(255,255,255,.1))}
.pname{font-family:'Lora',serif;font-size:20px;font-weight:600;margin-bottom:6px}
.psub{font-size:13px;opacity:.75;margin-bottom:8px}
.pb{padding:16px;margin-top:-44px}
.psr{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.ps{background:var(--wh);border-radius:var(--rmd);padding:14px;text-align:center;box-shadow:var(--sh-sm);border:1px solid rgba(0,0,0,.04)}
.psv{font-size:22px;font-weight:800;color:var(--g7)}
.psl{font-size:10.5px;color:var(--gr4);font-weight:500;margin-top:2px}

/* ── STARS ── */
.stars{display:flex;gap:2px}
.star{font-size:14px}

/* ── REVIEW CARDS ── */
.rc{background:var(--wh);border-radius:var(--rmd);padding:14px;box-shadow:var(--sh-sm);border:1px solid rgba(0,0,0,.04);margin-bottom:10px}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rf{font-size:13px;font-weight:700}
.rd{font-size:11px;color:var(--gr4)}
.rm{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.rp{display:flex;align-items:center;gap:4px;background:var(--gr1);padding:4px 8px;border-radius:6px;font-size:11px;color:var(--gr6);font-weight:500}

/* ── ALERTS ── */
.alert{padding:12px 14px;border-radius:var(--rsm);font-size:13px;line-height:1.5;display:flex;gap:10px;align-items:flex-start;margin-bottom:12px}
.ai{background:var(--g0);border:1px solid var(--g1);color:var(--g8)}
.aw{background:var(--ambl);border:1px solid #FDE68A;color:#92400E}
.ae{background:var(--redl);border:1px solid #FECACA;color:var(--red)}

/* ── PENDING ── */
.pending-card{background:var(--ambl);border:1.5px solid #FDE68A;border-radius:var(--rmd);padding:14px;margin-bottom:16px}

/* ── UPLOAD ── */
.upload-z{border:2px dashed var(--gr2);border-radius:var(--rsm);padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px}
.upload-z:active{border-color:var(--g4);background:var(--g0)}
.upload-z.done{border-color:var(--g5);background:var(--g0)}

/* ── RATING ── */
.rrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gr1)}
.rlbl{font-size:13.5px;font-weight:500}
.rstar-row{display:flex;gap:6px}
.rstar{font-size:28px;cursor:pointer;line-height:1;transition:transform .1s}
.rstar:active{transform:scale(.9)}

/* ── RFQ ── */
.rfq-c{background:var(--wh);border-radius:var(--rmd);padding:16px;box-shadow:var(--sh-sm);border:1px solid rgba(0,0,0,.04);margin-bottom:10px}
.rfq-t{font-size:14px;font-weight:700;color:var(--gr8);margin-bottom:6px}
.rfq-d{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.rfq-i{font-size:12px;color:var(--gr6)}

/* ── INVOICE ── */
.inv{background:var(--wh);border-radius:var(--rmd);padding:20px;box-shadow:var(--sh-md);border:1px solid var(--gr2);margin-top:16px}
.inv-h{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--g7);padding-bottom:16px;margin-bottom:16px}
.inv-t{font-family:'Lora',serif;font-size:22px;font-weight:600;color:var(--g8)}
.inv-c{font-size:11px;color:var(--gr6);margin-top:2px}
.inv-tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin:12px 0}
.inv-tbl th{background:var(--g0);padding:8px;text-align:left;font-weight:700;color:var(--g8);font-size:11px}
.inv-tbl td{padding:8px;border-bottom:1px solid var(--gr1)}
.inv-tot{text-align:right;font-size:14px;font-weight:700;color:var(--g8);padding-top:12px;border-top:1px solid var(--gr2)}
.inv-ft{margin-top:16px;padding-top:12px;border-top:1px dashed var(--gr2);display:flex;align-items:flex-end;justify-content:space-between}
.inv-ftxt{font-size:10px;color:var(--gr4);max-width:180px;line-height:1.5}
.inv-qr{width:64px;height:64px;background:var(--gr1);border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px dashed var(--gr2);font-size:28px}

/* ── BLACKLIST ── */
.bl-res{border-radius:var(--rmd);overflow:hidden;margin-top:16px}
.bl-danger{background:#FFF1F2;border:1.5px solid #FECDD3}
.bl-safe{background:var(--g0);border:1.5px solid var(--g1)}
.bl-h{padding:16px;display:flex;align-items:center;gap:12px}
.bl-b{padding:0 16px 16px;font-size:13px;line-height:1.6;color:#374151}

/* ── FORM SECTION ── */
.fs{background:var(--wh);border-radius:var(--rmd);padding:16px;box-shadow:var(--sh-sm);margin-bottom:12px}
.fs-t{font-size:13px;font-weight:700;color:var(--g8);margin-bottom:14px;display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:1px solid var(--gr1)}

/* ── PROGRESS ── */
.prog-row{display:flex;gap:6px;margin-bottom:20px}
.prog-bar{flex:1;height:4px;border-radius:2px;background:var(--gr2);transition:background .3s}
.prog-bar.done{background:var(--g5)}

/* ── ADMIN ── */
.asg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.as{border-radius:var(--rmd);padding:16px}
.asv{font-size:28px;font-weight:800}
.asl{font-size:12px;font-weight:500;margin-top:2px;opacity:.8}
.kyc-c{background:var(--wh);border-radius:var(--rmd);padding:14px;box-shadow:var(--sh-sm);border:1px solid rgba(0,0,0,.04);margin-bottom:10px}
.kyc-doc{background:var(--gr1);border-radius:8px;height:80px;display:flex;align-items:center;justify-content:center;margin:10px 0;border:1px dashed var(--gr2);font-size:13px;color:var(--gr4)}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);animation:fadeIn .15s ease}
.sheet{background:var(--wh);border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:430px;max-height:80vh;overflow-y:auto;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.s-handle{width:40px;height:4px;background:var(--gr2);border-radius:2px;margin:-8px auto 20px}

/* ── MISC ── */
.divider{height:1px;background:var(--gr1);margin:16px 0}
.dispute-banner{background:linear-gradient(135deg,#FEF2F2,#FFF1F2);border:1.5px solid #FECDD3;border-radius:var(--rmd);padding:14px;margin-bottom:16px;display:flex;gap:12px;align-items:center}
.row{display:flex;align-items:center;gap:8px}
.row-sb{display:flex;align-items:center;justify-content:space-between}
.gap8{gap:8px}
.mt8{margin-top:8px}
.mt12{margin-top:12px}
.mt16{margin-top:16px}
.mb12{margin-bottom:12px}
.mb16{margin-bottom:16px}
.flex1{flex:1}
.hidden{display:none!important}
.scroll-body{overflow-y:auto;height:calc(100vh - 60px - env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const state = {
  loggedIn: false,
  role: 'seller',
  activeTab: 'home',
  subScreen: null,
  subData: null,

  // Form states
  loginStep: 'phone', phone: '', otp: '', // phone|otp|role
  reviewStep: 1,
  reviewForm: { phone:'', name:'', commodity:'', notes:'', tonase:0, grade:0, waktu:0, uploaded:false },
  reviewDone: false,
  blQuery: '', blType: 'rekening', blResult: null, blSearched: false,
  rfqPosted: false, rfqShowForm: false,
  invForm: { buyer:'PT Kopi Nusantara Tbk', commodity:'Kopi Robusta Grade A', qty:'5000', unit:'Kg', price:'45000', date:'21 Apr 2025' },
  invGenerated: false,
  adminTab: 'kyc',
  kycItems: [
    {id:1,name:'PT Agro Makmur Jaya',phone:'083456789012',type:'NPWP',date:'19 Apr 2025',status:'pending'},
    {id:2,name:'UD Sinar Harapan',phone:'087654321098',type:'KTP',date:'20 Apr 2025',status:'pending'},
  ],
  searchQuery: '', searchFilter: 'Semua',
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const h = (tag, cls, inner='', attrs='') =>
  `<${tag}${cls?' class="'+cls+'"':''}${attrs?(' '+attrs):''}>${inner}</${tag}>`;
const stars = (val, size=14) => {
  let s=''; for(let i=1;i<=5;i++)
    s+=`<span class="star" style="font-size:${size}px;color:${i<=Math.round(val)?'#C9941A':'#E5E7EB'}"">★</span>`;
  return `<div class="stars">${s}</div>`;
};
const starRater = (key, val) => {
  let s=''; for(let i=1;i<=5;i++)
    s+=`<span class="rstar" onclick="setRating('${key}',${i})" style="color:${i<=val?'#C9941A':'#E5E7EB'}"">★</span>`;
  return `<div class="rstar-row">${s}</div>`;
};

// ─── RENDER ENGINE ───────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = buildApp();
  attachEvents();
}

function buildApp() {
  if (!state.loggedIn) return buildSplash();

  let content = '';
  if (state.subScreen) {
    content = buildSubScreen();
  } else {
    content = buildTopNav() + `<div class="scroll-body">` + buildMainTab() + `</div>` + buildBottomNav();
  }
  return `<div style="position:relative;min-height:100vh">${content}</div>`;
}

  const filters = ['Semua','Kopi','Jagung','Kedelai','Rempah','Cokelat','Cabai'];
  const filtered = USERS.filter(u=>

    (f==='Semua'||u.commodity.some(c=>c.includes(f))));
  return `<div class="page">

function doBlacklist() {
  const q = state.blQuery.replace(/\s/g,'');
  state.blResult = BLACKLIST.find(b=>b.type===state.blType&&b.number.includes(q))||null;
  state.blSearched = true; renderInPlace();
}
function approveKyc(id) {
  state.kycItems = state.kycItems.map(u=>u.id===id?{...u,status:'approved'}:u); renderInPlace();
}
function rejectKyc(id) {
  state.kycItems = state.kycItems.map(u=>u.id===id?{...u,status:'rejected'}:u); renderInPlace();
}

// Smart re-render (keep scroll pos, update only inner content for forms)
function renderInPlace() {
  const el = document.getElementById('app');
  const scrollTop = el.querySelector('.scroll-body')?.scrollTop || 0;
  el.innerHTML = buildApp();
  attachEvents();
  if (scrollTop) {
    const sb = el.querySelector('.scroll-body');
    if (sb) sb.scrollTop = scrollTop;
  }
}

function attachEvents() {
  // Prevent form submit on Enter
  document.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', e => { if(e.key==='Enter') e.preventDefault(); });
  });
}

// ─── PWA MANIFEST & SERVICE WORKER ───────────────────────────────────────────
function installPWA() {
  const manifest = {
    name: 'Amanah Indonesia',
    short_name: 'Amanah',
    description: 'Cek Kredibilitas Buyer & Seller Komoditas',
    start_url: '/',
    display: 'standalone',
    background_color: '#0D2818',
    theme_color: '#1A4731',
    orientation: 'portrait',
    icons: [{
      src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='32' fill='%231A4731'/%3E%3Ctext y='130' x='96' font-size='110' text-anchor='middle'%3E🛡️%3C/text%3E%3C/svg%3E",
      sizes: '192x192', type: 'image/svg+xml', purpose: 'any maskable'
    }]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = url;
  document.head.appendChild(link);

  if ('serviceWorker' in navigator) {
    const sw = `
      const CACHE = 'amanah-v1';
      self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/']))));
      self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
    `;
    const swBlob = new Blob([sw], {type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
installPWA();
render();
</script>
